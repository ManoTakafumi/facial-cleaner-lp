<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACIAL CLEANER</title>
    <link rel="stylesheet" href="../css/destyle.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="bubble-layer">
            <span class="bubble"></span>
            <span class="bubble"></span>
            <span class="bubble"></span>
        </div>

        <main class="main">
            <section id="hero">
                <img src="../image/tube_soap.png" class="hero-img">
                
                <div class="hero-title">
                    <h1>肌に触れるたび、<br>
                    空気のようにやさしく。</h1>

                    <p>敏感肌のための洗顔体験</p>

                    <a href="" class="contact">体験してみる</a>
                </div>
            </section>

            <section id="concept" class="fade-section">
                <div class="">
                    <p>洗うことは、落とすことでは<br>ありません。</p>
                    <p>肌を守り、整えるための<br>やさしい時間です。</p>
                </div>
            </section>

            <section id="parallax" class="fade-section">
                <h1>泡は、刺激を和らげるために<br>
                生まれました。</h1>
            </section>

            <section id="philosophy" class="fade-section">
                <div class="philosophy-items">
                    <h2>肌へのやさしさ</h2>
                    <ul class="philosophy-detail">
                        <li>低刺激</li>
                        <li>弱酸性</li>
                    </ul>
                </div>

                <div class="philosophy-items">
                    <h2>余計なものを使わない</h2>
                    <ul class="philosophy-detail">
                        <li>シンプル</li>
                        <li>必要最低限</li>
                    </ul>
                </div>
            </section>

            <section id="how-use" class="fade-section">
                <div class="how-use-items">
                    <h1>洗顔は、力を入れないこと。</h1>

                    <p>泡は肌にダメージを与えず、<br>
                    そっと包み込みます。<br>
                    洗い上がりもつっぱらず、さっぱり</p>
                </div>
            </section>

            <section id="closing" class="fade-section">
                <img src="../image/nozzle_soap 2.png">
                <div class="closing-items">
                    <p>肌にやさしく向き合う<br>
                    その時間を大切に</p>

                    <a href="" class="contact">試してみる</a>
                </div>
            </section>

            <footer id="footer">
                <p>&copy; Mano FACIAL CLEANER</p>
            </footer>
        </main>

    </div>
    <div></div>
    
    <script src="../JS/facial_cleaner.js"></script>
</body>
</html>
